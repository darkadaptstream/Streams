<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkAdapt Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .tagline { color: #777; margin-bottom: 50px; font-size: 0.95rem; }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 40px 35px;
            width: 92%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .card h2 { margin-bottom: 25px; font-size: 1.1rem; color: #ccc; font-weight: 400; }
        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: #252525;
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            outline: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #ff4444; }
        input[type="text"]::placeholder { letter-spacing: 1px; color: #555; }
        button {
            width: 100%;
            padding: 16px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #e03333; }
        button:active { transform: scale(0.98); }
        .error {
            color: #ff6666;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .loading-btn { opacity: 0.7; pointer-events: none; }
        .footer { margin-top: 40px; color: #444; font-size: 0.8rem; }
        .divider { margin: 25px 0; border: none; border-top: 1px solid #2a2a2a; }
        .hint { color: #555; font-size: 0.8rem; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="logo">▶ DarkStream</div>
    <div class="tagline">Private Video Platform</div>

    <div class="card">
        <h2>🔑 Enter your access key to watch</h2>
        <input type="text" id="keyInput" placeholder="Enter Key Here" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="accessBtn" onclick="checkKey()">▶ Access Content</button>
        <div class="error" id="errorMsg">❌ Invalid key. Check and try again.</div>
        <div class="hint">Keys are case-insensitive</div>
    </div>

    <div class="footer">© 2026 DarkAdapt Stream · All rights reserved</div>

    <script>
        async function checkKey() {
            const input = document.getElementById('keyInput');
            const key = input.value.trim().toUpperCase();
            const btn = document.getElementById('accessBtn');
            const err = document.getElementById('errorMsg');

            if (!key) { input.focus(); return; }

            err.style.display = 'none';
            btn.textContent = 'Checking...';
            btn.classList.add('loading-btn');

            try {
                const res = await fetch('keys.json?v=' + Date.now());
                const keys = await res.json();

                if (keys[key]) {
                    const data = keys[key];
                    if (data.type === 'video') {
                        window.location.href = `player.html?key=${key}`;
                    } else if (data.type === 'folder') {
                        window.location.href = `playlist.html?key=${key}`;
                    }
                } else {
                    err.style.display = 'block';
                    btn.textContent = '▶ Access Content';
                    btn.classList.remove('loading-btn');
                }
            } catch (e) {
                err.textContent = '⚠️ Error loading. Please refresh and try again.';
                err.style.display = 'block';
                btn.textContent = '▶ Access Content';
                btn.classList.remove('loading-btn');
            }
        }

        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkKey();
        });
    </script>
</body>
</html>
