<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkStream · My Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root{--bg:#080808;--surface:#111111;--surface2:#1a1a1a;--accent:#E63946;--text:#f0f0f0;--muted:#666;--border:#1f1f1f;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
        header{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;}
        .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1.1rem;text-decoration:none;color:var(--text);}
        .logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;}
        .logo span{color:var(--accent);}
        .header-right{display:flex;align-items:center;gap:10px;}
        .hdr-btn{padding:7px 14px;border-radius:7px;font-size:0.8rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;gap:5px;border:none;}
        .hdr-btn.primary{background:var(--accent);color:#fff;}
        .hdr-btn.primary:hover{background:#c1121f;}
        .hdr-btn.secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
        .hdr-btn.secondary:hover{color:var(--text);}
        .user-badge{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
        .user-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;}
        main{max-width:1100px;margin:0 auto;padding:30px 16px 60px;}
        .section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
        .section-title{font-size:1rem;font-weight:700;}
        .section-count{font-size:0.78rem;color:var(--muted);background:var(--surface2);padding:3px 10px;border-radius:20px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.2s,border-color 0.2s;text-decoration:none;color:var(--text);display:block;}
        .card:hover{transform:translateY(-3px);border-color:#2a2a2a;}
        .card:active{transform:scale(0.98);}
        .thumb-wrap{position:relative;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;}
        .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
        .card:hover .thumb-wrap img{transform:scale(1.04);}
        .thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#111);color:#222;font-size:2.5rem;}
        .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
        .card:hover .play-overlay{background:rgba(0,0,0,0.4);}
        .play-btn-icon{width:48px;height:48px;background:rgba(230,57,70,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;opacity:0;transform:scale(0.8);transition:opacity 0.2s,transform 0.2s;}
        .card:hover .play-btn-icon{opacity:1;transform:scale(1);}
        .duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.8);color:#fff;font-size:0.7rem;font-weight:600;padding:2px 7px;border-radius:4px;}
        .type-badge{position:absolute;top:8px;left:8px;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:0.5px;}
        .type-badge.video{background:rgba(230,57,70,0.85);color:#fff;}
        .type-badge.folder{background:rgba(99,102,241,0.85);color:#fff;}
        .expired-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
        .expired-txt{color:#ff6b6b;font-size:0.78rem;font-weight:700;}
        .card-body{padding:14px;}
        .card-title{font-size:0.92rem;font-weight:600;margin-bottom:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .card-desc{font-size:0.78rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .card-meta{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
        .expiry-pill{font-size:0.68rem;padding:2px 8px;border-radius:4px;font-weight:600;}
        .expiry-pill.active{background:rgba(34,197,94,0.15);color:#4ade80;}
        .expiry-pill.expired{background:rgba(230,57,70,0.15);color:#ff6b6b;}
        .expiry-pill.lifetime{background:rgba(99,102,241,0.15);color:#a5b4fc;}
        .meta-tag{font-size:0.7rem;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:4px;}
        .empty{text-align:center;padding:80px 20px;color:var(--muted);}
        .empty-icon{font-size:3rem;margin-bottom:16px;}
        .empty h3{font-size:1.1rem;color:var(--text);margin-bottom:8px;}
        .empty p{font-size:0.85rem;margin-bottom:24px;}
        .empty a{display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;}
        .loading-screen{text-align:center;padding:80px 20px;}
        .big-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;}.card-body{padding:10px;}.card-title{font-size:0.82rem;}.card-desc{display:none;}}
    </style>
</head>
<body>
    <header>
        <a href="dashboard.html" class="logo"><div class="logo-icon">▶</div>Dark<span>Stream</span></a>
        <div class="header-right">
            <div class="user-badge"><div class="user-dot"></div><span id="userName">Loading...</span></div>
            <a href="redeem.html" class="hdr-btn primary">+ Key</a>
            <button class="hdr-btn secondary" onclick="logout()">Sign Out</button>
        </div>
    </header>
    <main>
        <div class="loading-screen" id="loadingScreen"><div class="big-spinner"></div><div style="color:var(--muted);font-size:0.85rem;">Loading your library...</div></div>
        <div id="content" style="display:none;">
            <div class="section-hd">
                <div class="section-title">My Library</div>
                <div class="section-count" id="countBadge">0 items</div>
            </div>
            <div class="grid" id="grid"></div>
            <div class="empty" id="emptyState" style="display:none;">
                <div class="empty-icon">🔒</div>
                <h3>No Content Yet</h3>
                <p>Redeem an access key to unlock your first content.</p>
                <a href="redeem.html">🎟️ Redeem Key →</a>
            </div>
        </div>
    </main>

    <script>
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            const user = session.user;
            const name = user.user_metadata?.username || user.email.split('@')[0];
            document.getElementById('userName').textContent = name;
            loadContent(user.id);
        }

        async function loadContent(userId) {
            const { data, error } = await sb.from('user_keys').select('*').eq('user_id', userId).eq('is_active', true).order('redeemed_at', { ascending: false });
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            if (error || !data || data.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('countBadge').textContent = '0 items';
                return;
            }
            document.getElementById('countBadge').textContent = data.length + (data.length===1?' item':' items');
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(item => {
                const c = item.content_data;
                const isFolder = c.type === 'folder';
                const isExpired = item.expires_at && new Date(item.expires_at) < new Date();
                const url = isExpired ? '#' : (isFolder ? `playlist.html?key=${item.key_code}` : `watch.html?key=${item.key_code}`);
                const expTag = !item.expires_at
                    ? '<span class="expiry-pill lifetime">∞ Lifetime</span>'
                    : isExpired
                        ? '<span class="expiry-pill expired">❌ Expired</span>'
                        : `<span class="expiry-pill active">⏳ ${Math.ceil((new Date(item.expires_at)-new Date())/86400000)}d left</span>`;
                const thumb = c.thumbnail
                    ? `<img src="${c.thumbnail}" alt="${c.title}" loading="lazy" onerror="this.style.display='none'">`
                    : `<div class="thumb-placeholder">🎬</div>`;
                return `
                <a class="card" href="${url}" ${isExpired?'onclick="return false"':''}>
                    <div class="thumb-wrap">
                        ${thumb}
                        ${isExpired ? '<div class="expired-overlay"><span style="font-size:1.5rem">🔒</span><span class="expired-txt">EXPIRED</span></div>' : `
                        <div class="play-overlay"><div class="play-btn-icon">▶</div></div>`}
                        <span class="type-badge ${isFolder?'folder':'video'}">${isFolder?'PLAYLIST':'VIDEO'}</span>
                        ${c.duration?`<span class="duration">${c.duration}</span>`:''}
                    </div>
                    <div class="card-body">
                        <div class="card-title">${c.title}</div>
                        ${c.description?`<div class="card-desc">${c.description}</div>`:''}
                        <div class="card-meta">
                            ${expTag}
                            ${isFolder?`<span class="meta-tag">${(c.videos||[]).length} eps</span>`:''}
                        </div>
                    </div>
                </a>`;
            }).join('');
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = 'login.html';
        }

        init();
    </script>
</body>
</html>
