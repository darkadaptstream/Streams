<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DarkStream Player</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #111111;
            --surface2: #1a1a1a;
            --accent: #E63946;
            --text: #f0f0f0;
            --muted: #666;
            --border: #1f1f1f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header {
            background: rgba(8,8,8,0.95);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 54px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: var(--text); text-decoration: none;
            font-size: 0.88rem; font-weight: 500; opacity: 0.8;
        }
        .back-btn:hover { opacity: 1; }
        .logo { font-weight: 800; font-size: 1rem; }
        .logo span { color: var(--accent); }

        /* LAYOUT */
        .layout { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

        /* ═══ VIDEO PLAYER ═══ */
        .player-outer {
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 50px rgba(0,0,0,0.7);
        }

        #vid {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
            cursor: pointer;
        }

        /* LOADER */
        .loader {
            position: absolute; inset: 0;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5);
        }
        .loader.show { display: flex; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SEEK FLASH */
        .seek-flash {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 0.9rem; font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .seek-flash.left { left: 20px; }
        .seek-flash.right { right: 20px; }
        .seek-flash.show { opacity: 1; }

        /* PLAY PULSE */
        .play-pulse {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(0.8);
            width: 60px; height: 60px;
            background: rgba(0,0,0,0.55);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
        }
        .play-pulse.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

        /* ── CONTROLS ── */
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 0 14px 14px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            transition: opacity 0.3s;
        }
        .controls.hidden { opacity: 0; pointer-events: none; }

        /* PROGRESS */
        .progress-area {
            padding: 10px 0 6px;
            cursor: pointer;
        }
        .progress-track {
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            position: relative;
            transition: height 0.15s;
        }
        .progress-area:hover .progress-track { height: 5px; }
        .progress-fill {
            height: 100%; width: 0%;
            background: var(--accent);
            border-radius: 3px;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute; right: -5px; top: 50%;
            transform: translateY(-50%) scale(0);
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.15s;
        }
        .progress-area:hover .progress-fill::after { transform: translateY(-50%) scale(1); }
        .progress-buffer {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            pointer-events: none;
        }

        /* CTRL ROW */
        .ctrl-row {
            display: flex; align-items: center; gap: 6px;
        }
        .c-btn {
            background: none; border: none;
            color: rgba(255,255,255,0.9);
            cursor: pointer; padding: 6px;
            border-radius: 6px; font-size: 1.1rem;
            line-height: 1;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
        }
        .c-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .time-txt {
            font-size: 0.75rem; color: rgba(255,255,255,0.75);
            flex: 1; white-space: nowrap; padding: 0 4px;
            font-variant-numeric: tabular-nums;
        }

        /* VOLUME */
        .vol-wrap { display: flex; align-items: center; gap: 6px; }
        .vol-range {
            -webkit-appearance: none;
            width: 64px; height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px; outline: none;
        }
        .vol-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: #fff; border-radius: 50%;
        }

        /* SPEED */
        .speed-wrap { position: relative; }
        .speed-label {
            background: rgba(255,255,255,0.12);
            border: none; color: #fff;
            font-size: 0.72rem; font-weight: 600;
            font-family: 'Inter', sans-serif;
            padding: 4px 8px; border-radius: 5px;
            cursor: pointer; white-space: nowrap;
        }
        .speed-menu {
            position: absolute; bottom: 36px; right: 0;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 6px 0;
            min-width: 110px;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            z-index: 10;
        }
        .speed-menu.open { display: block; }
        .speed-opt {
            padding: 9px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
            color: #ccc;
        }
        .speed-opt:hover { background: #252525; color: #fff; }
        .speed-opt.on { color: var(--accent); font-weight: 600; }

        /* FULLSCREEN */
        .player-outer:fullscreen,
        .player-outer:-webkit-full-screen {
            border-radius: 0;
            width: 100vw; height: 100vh;
            aspect-ratio: unset;
        }

        /* VIDEO INFO */
        .video-info { margin-top: 18px; }
        .video-title-txt { font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
        .video-desc-txt { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-top: 8px; }
        .video-meta { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .meta-chip {
            font-size: 0.72rem; color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3px 10px; border-radius: 20px;
        }

        /* DOUBLE TAP ZONES */
        .tap-left, .tap-right {
            position: absolute; top: 0; bottom: 60px; width: 35%;
            z-index: 5;
        }
        .tap-left { left: 0; }
        .tap-right { right: 0; }
    </style>
</head>
<body>
    <header>
        <a href="dashboard.html" class="back-btn">← Library</a>
        <div class="logo">Dark<span>Stream</span></div>
        <div style="width:60px"></div>
    </header>

    <div class="layout">
        <div class="player-outer" id="playerOuter">
            <video id="vid" preload="metadata"></video>

            <!-- Double tap zones -->
            <div class="tap-left" id="tapLeft"></div>
            <div class="tap-right" id="tapRight"></div>

            <div class="loader" id="loader"><div class="spinner"></div></div>
            <div class="play-pulse" id="playPulse"></div>
            <div class="seek-flash left" id="seekLeft">⏪ 10s</div>
            <div class="seek-flash right" id="seekRight">10s ⏩</div>

            <div class="controls" id="controls">
                <div class="progress-area" id="progressArea">
                    <div class="progress-track">
                        <div class="progress-buffer" id="bufferFill"></div>
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="ctrl-row">
                    <button class="c-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause">▶</button>
                    <button class="c-btn" onclick="seek(-10)" title="-10s">⏪</button>
                    <button class="c-btn" onclick="seek(10)" title="+10s">⏩</button>
                    <span class="time-txt" id="timeTxt">0:00 / 0:00</span>
                    <div class="vol-wrap">
                        <button class="c-btn" onclick="toggleMute()" id="muteBtn" title="Mute">🔊</button>
                        <input type="range" class="vol-range" id="volRange" min="0" max="1" step="0.05" value="1"
                            oninput="setVol(this.value)" title="Volume">
                    </div>
                    <div class="speed-wrap">
                        <button class="speed-label" onclick="toggleSpeedMenu()" id="speedBtn">1×</button>
                        <div class="speed-menu" id="speedMenu">
                            <div class="speed-opt" onclick="setSpeed(0.5)">0.5× Slow</div>
                            <div class="speed-opt" onclick="setSpeed(0.75)">0.75×</div>
                            <div class="speed-opt on" onclick="setSpeed(1)">1× Normal</div>
                            <div class="speed-opt" onclick="setSpeed(1.25)">1.25×</div>
                            <div class="speed-opt" onclick="setSpeed(1.5)">1.5× Fast</div>
                            <div class="speed-opt" onclick="setSpeed(2)">2× Fastest</div>
                        </div>
                    </div>
                    <button class="c-btn" onclick="toggleFS()" title="Fullscreen">⛶</button>
                </div>
            </div>
        </div>

        <div class="video-info" id="videoInfo"></div>
    </div>

    <script>
        const vid = document.getElementById('vid');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const bufferFill = document.getElementById('bufferFill');
        const timeTxt = document.getElementById('timeTxt');
        const controls = document.getElementById('controls');
        const loader = document.getElementById('loader');
        const playPulse = document.getElementById('playPulse');
        const outer = document.getElementById('playerOuter');
        let hideTimer, tapTimer = {};

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ── LOAD VIDEO ──
        async function load() {
            const p = new URLSearchParams(location.search);
            const key = p.get('key');
            if (!key) { location.href = 'dashboard.html'; return; }

            try {
                const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = "login.html"; return; }
            const { data: ukData } = await sb.from("user_keys").select("*").eq("key_code", key).eq("user_id", session.user.id).single();
            if (!ukData) { location.href = "dashboard.html"; return; }
            const data = ukData.content_data;
            if (!data) { location.href = "dashboard.html"; return; }
            if (ukData.expires_at && new Date(ukData.expires_at) < new Date()) { alert("Your key has expired. Please redeem a new key."); location.href = "dashboard.html"; return; }
                const keys = await res.json();
                const data = keys[key];
                if (!data || data.type !== 'video') { location.href = 'dashboard.html'; return; }

                document.title = data.title + ' · DarkStream';
                vid.src = data.url;

                document.getElementById('videoInfo').innerHTML = `
                    <div class="video-title-txt">${data.title}</div>
                    ${data.description ? `<div class="video-desc-txt">${data.description}</div>` : ''}
                    <div class="video-meta">
                        ${data.duration ? `<span class="meta-chip">⏱ ${data.duration}</span>` : ''}
                        <span class="meta-chip">🔑 Key: ${key}</span>
                    </div>
                `;
            } catch(e) {
                alert('Error loading video. Go back and try again.');
                location.href = 'dashboard.html';
            }
        }

        // ── CONTROLS VISIBILITY ──
        function showControls() {
            controls.classList.remove('hidden');
            clearTimeout(hideTimer);
            if (!vid.paused) hideTimer = setTimeout(() => controls.classList.add('hidden'), 3000);
        }

        outer.addEventListener('mousemove', showControls);
        outer.addEventListener('touchstart', showControls, { passive: true });

        // ── PLAY / PAUSE ──
        function togglePlay() {
            vid.paused ? vid.play() : vid.pause();
        }

        function pulse(icon) {
            playPulse.textContent = icon;
            playPulse.classList.add('show');
            clearTimeout(pulse._t);
            pulse._t = setTimeout(() => playPulse.classList.remove('show'), 500);
        }

        vid.addEventListener('play', () => { playBtn.textContent = '⏸'; showControls(); });
        vid.addEventListener('pause', () => { playBtn.textContent = '▶'; controls.classList.remove('hidden'); clearTimeout(hideTimer); pulse('⏸'); });
        vid.addEventListener('playing', () => { loader.classList.remove('show'); pulse('▶'); });
        vid.addEventListener('waiting', () => loader.classList.add('show'));
        vid.addEventListener('canplay', () => loader.classList.remove('show'));

        // Center tap = play/pause
        outer.addEventListener('click', e => {
            if (e.target.closest('.tap-left') || e.target.closest('.tap-right') ||
                e.target.closest('.controls')) return;
            togglePlay();
        });

        // ── DOUBLE TAP SEEK ──
        function setupDoubleTap(el, dir) {
            let taps = 0;
            el.addEventListener('click', () => {
                taps++;
                if (taps === 1) {
                    tapTimer[dir] = setTimeout(() => { taps = 0; }, 300);
                } else {
                    clearTimeout(tapTimer[dir]);
                    taps = 0;
                    seek(dir === 'left' ? -10 : 10);
                    const el2 = dir === 'left' ? document.getElementById('seekLeft') : document.getElementById('seekRight');
                    el2.classList.add('show');
                    setTimeout(() => el2.classList.remove('show'), 700);
                }
            });
        }
        setupDoubleTap(document.getElementById('tapLeft'), 'left');
        setupDoubleTap(document.getElementById('tapRight'), 'right');

        // ── SEEK ──
        function seek(s) { vid.currentTime = Math.max(0, Math.min(vid.duration || 0, vid.currentTime + s)); }

        // ── PROGRESS ──
        vid.addEventListener('timeupdate', () => {
            if (!vid.duration) return;
            const pct = (vid.currentTime / vid.duration) * 100;
            progressFill.style.width = pct + '%';
            timeTxt.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
        });

        vid.addEventListener('progress', () => {
            if (vid.buffered.length && vid.duration) {
                const b = (vid.buffered.end(vid.buffered.length - 1) / vid.duration) * 100;
                bufferFill.style.width = b + '%';
            }
        });

        document.getElementById('progressArea').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            vid.currentTime = ((e.clientX - rect.left) / rect.width) * vid.duration;
        });

        // ── VOLUME ──
        function setVol(v) { vid.volume = v; vid.muted = v == 0; updateMuteBtn(); }
        function toggleMute() {
            vid.muted = !vid.muted;
            document.getElementById('volRange').value = vid.muted ? 0 : vid.volume;
            updateMuteBtn();
        }
        function updateMuteBtn() {
            document.getElementById('muteBtn').textContent = (vid.muted || vid.volume == 0) ? '🔇' : '🔊';
        }

        // ── SPEED ──
        function toggleSpeedMenu() { document.getElementById('speedMenu').classList.toggle('open'); }
        function setSpeed(s) {
            vid.playbackRate = s;
            document.getElementById('speedBtn').textContent = s + '×';
            document.querySelectorAll('.speed-opt').forEach(o => o.classList.toggle('on', parseFloat(o.textContent) === s));
            document.getElementById('speedMenu').classList.remove('open');
        }
        document.addEventListener('click', e => {
            if (!e.target.closest('.speed-wrap')) document.getElementById('speedMenu').classList.remove('open');
        });

        // ── FULLSCREEN + LANDSCAPE ──
        function toggleFS() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                (outer.requestFullscreen || outer.webkitRequestFullscreen).call(outer);
                if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(() => {});
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                if (screen.orientation?.unlock) screen.orientation.unlock();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const btn = document.querySelector('.c-btn[onclick="toggleFS()"]');
            if (btn) btn.textContent = document.fullscreenElement ? '✕' : '⛶';
        });

        // ── TIME FORMAT ──
        function fmt(s) {
            if (isNaN(s)) return '0:00';
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60).toString().padStart(2, '0');
            return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${sec}` : `${m}:${sec}`;
        }

        load();
        showControls();
    </script>
</body>
</html>
