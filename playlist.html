<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkStream Playlist</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .header {
            padding: 14px 20px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .back { color: #ff4444; text-decoration: none; font-size: 1.1rem; }
        .logo { font-weight: bold; color: #ff4444; font-size: 1.1rem; }
        .container {
            max-width: 1100px;
            margin: 25px auto;
            padding: 0 16px;
            display: grid;
            grid-template-columns: 1fr 310px;
            gap: 20px;
        }
        .player-section {}
        .plyr { border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        :root { --plyr-color-main: #ff4444; }
        .now-playing {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 14px 0 5px;
        }
        .ep-count { color: #777; font-size: 0.85rem; }
        .playlist-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            max-height: 520px;
            overflow-y: auto;
        }
        .playlist-box::-webkit-scrollbar { width: 4px; }
        .playlist-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .pl-header {
            font-size: 0.9rem;
            color: #aaa;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
        }
        .pl-item {
            padding: 11px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 0.88rem;
            color: #ccc;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pl-item:hover { background: #252525; }
        .pl-item.active {
            background: rgba(255,68,68,0.15);
            border-left: 3px solid #ff4444;
            color: #fff;
            padding-left: 9px;
        }
        .pl-num { color: #555; font-size: 0.8rem; min-width: 20px; }
        .pl-item.active .pl-num { color: #ff4444; }
        @media(max-width: 650px) {
            .container { grid-template-columns: 1fr; }
            .playlist-box { max-height: 280px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← Back</a>
        <div class="logo">▶ DarkStream</div>
    </div>

    <div class="container">
        <div class="player-section">
            <video id="player" controls playsinline style="width:100%;border-radius:12px;"></video>
            <div class="now-playing" id="nowPlaying">Loading...</div>
            <div class="ep-count" id="epCount"></div>
        </div>
        <div class="playlist-box">
            <div class="pl-header">📋 Playlist</div>
            <div id="playlistItems">Loading...</div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        let player;
        let videos = [];
        let currentIndex = 0;

        async function loadPlaylist() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('key');
            if (!key) { window.location.href = 'index.html'; return; }

            try {
                const res = await fetch('keys.json?v=' + Date.now());
                const keys = await res.json();
                if (!keys[key] || keys[key].type !== 'folder') { window.location.href = 'index.html'; return; }

                const data = keys[key];
                videos = data.videos;
                document.title = data.title + ' · DarkStream';
                document.getElementById('epCount').textContent = videos.length + ' videos in playlist';

                const list = document.getElementById('playlistItems');
                list.innerHTML = videos.map((v, i) => `
                    <div class="pl-item ${i === 0 ? 'active' : ''}" id="item-${i}" onclick="playVideo(${i})">
                        <span class="pl-num">${i + 1}</span>
                        <span>${v.title}</span>
                    </div>
                `).join('');

                player = new Plyr('#player', {
                    controls: ['play-large','play','rewind','fast-forward','progress','current-time','duration','mute','volume','settings','fullscreen'],
                    settings: ['speed'],
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                });

                document.getElementById('player').addEventListener('ended', () => {
                    if (currentIndex < videos.length - 1) playVideo(currentIndex + 1);
                });

                playVideo(0);

            } catch(e) {
                document.getElementById('playlistItems').innerHTML = '<div style="color:#ff4444;padding:10px;">Error loading playlist.</div>';
            }
        }

        function playVideo(index) {
            currentIndex = index;
            const v = videos[index];
            const videoEl = document.getElementById('player');
            videoEl.src = v.url;
            videoEl.play().catch(() => {});
            document.getElementById('nowPlaying').textContent = '🎬 ' + v.title;
            document.querySelectorAll('.pl-item').forEach(el => el.classList.remove('active'));
            const item = document.getElementById('item-' + index);
            if (item) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        loadPlaylist();
    </script>
</body>
</html>
