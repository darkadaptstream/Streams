<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkStream · Redeem Key</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="config.js"></script>
    <style>
        :root{--bg:#080808;--surface:#121212;--surface2:#1a1a1a;--accent:#E63946;--accent2:#c1121f;--text:#f0f0f0;--muted:#666;--border:#1f1f1f;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
        header{background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;}
        .back-btn{display:flex;align-items:center;gap:6px;color:var(--text);text-decoration:none;font-size:0.88rem;font-weight:500;opacity:0.8;}
        .logo{font-weight:800;font-size:1rem;}
        .logo span{color:var(--accent);}
        .page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;min-height:calc(100vh - 54px);}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:100%;max-width:420px;}
        .card-icon{font-size:2.5rem;margin-bottom:14px;text-align:center;}
        .card-title{font-size:1.2rem;font-weight:800;margin-bottom:6px;text-align:center;}
        .card-sub{color:var(--muted);font-size:0.83rem;text-align:center;margin-bottom:28px;line-height:1.6;}
        .field label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
        .input-wrap{position:relative;}
        .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:0.9rem;color:var(--muted);}
        input{width:100%;padding:15px 15px 15px 40px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:1rem;font-family:'Inter',sans-serif;letter-spacing:3px;text-transform:uppercase;outline:none;transition:border-color 0.2s;text-align:center;}
        input:focus{border-color:var(--accent);}
        input::placeholder{letter-spacing:1px;font-size:0.85rem;text-transform:none;}
        .btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:0.95rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center;margin-top:12px;}
        .btn:hover{background:var(--accent2);}
        .btn:disabled{opacity:0.6;pointer-events:none;}
        .msg{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:0.83rem;display:none;}
        .msg.error{background:rgba(230,57,70,0.1);color:#ff6b6b;border:1px solid rgba(230,57,70,0.2);}
        .msg.success{background:rgba(34,197,94,0.1);color:#4ade80;border:1px solid rgba(34,197,94,0.2);}
        .msg.info{background:rgba(99,102,241,0.1);color:#a5b4fc;border:1px solid rgba(99,102,241,0.2);}
        .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:16px;display:none;}
        .preview-box .p-title{font-weight:700;margin-bottom:4px;}
        .preview-box .p-desc{font-size:0.82rem;color:var(--muted);}
        .preview-box .p-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
        .p-chip{font-size:0.72rem;background:var(--surface);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--muted);}
        .confirm-btn{width:100%;padding:13px;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);border-radius:9px;font-size:0.9rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:12px;display:none;}
        .confirm-btn:hover{background:rgba(34,197,94,0.25);}
    </style>
</head>
<body>
    <header>
        <a href="dashboard.html" class="back-btn">← Dashboard</a>
        <div class="logo">Dark<span>Stream</span></div>
        <div style="width:60px"></div>
    </header>
    <div class="page">
        <div class="card">
            <div class="card-icon">🎟️</div>
            <div class="card-title">Redeem Access Key</div>
            <div class="card-sub">Enter your key to unlock content. Each key can only be used once.</div>
            <div class="field">
                <label>Access Key</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="text" id="keyInput" placeholder="Enter your key" maxlength="16" autocomplete="off" spellcheck="false">
                </div>
            </div>
            <button class="btn" id="checkBtn" onclick="checkKey()">Check Key</button>
            <div class="preview-box" id="previewBox">
                <div class="p-title" id="previewTitle"></div>
                <div class="p-desc" id="previewDesc"></div>
                <div class="p-meta" id="previewMeta"></div>
            </div>
            <button class="confirm-btn" id="confirmBtn" onclick="redeemKey()">✅ Confirm & Redeem</button>
            <div class="msg" id="msg"></div>
        </div>
    </div>
    <script>
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const session = JSON.parse(localStorage.getItem('ds_session') || 'null');
        if (!session) window.location.href = 'login.html';
        let currentKeyData = null;

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
        }

        async function checkKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) return;
            document.getElementById('msg').style.display = 'none';
            document.getElementById('previewBox').style.display = 'none';
            document.getElementById('confirmBtn').style.display = 'none';
            const btn = document.getElementById('checkBtn');
            btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>';

            const { data, error } = await sb.from('access_keys').select('*').eq('key_code', key).single();
            btn.disabled = false; btn.textContent = 'Check Key';

            if (error || !data) { showMsg('❌ Invalid key. Check and try again.','error'); return; }
            if (data.used_count >= data.max_uses) { showMsg('❌ This key has already been used.','error'); return; }
            if (data.expires_at && new Date(data.expires_at) < new Date()) { showMsg('❌ This key has expired.','error'); return; }

            const { data: existing } = await sb.from('user_keys').select('id').eq('key_code', key).eq('user_id', session.id).single();
            if (existing) { showMsg('ℹ️ You already redeemed this key.','info'); return; }

            currentKeyData = data;
            const c = data.content_data;
            document.getElementById('previewTitle').textContent = '🎬 ' + c.title;
            document.getElementById('previewDesc').textContent = c.description || '';
            document.getElementById('previewMeta').innerHTML = `
                <span class="p-chip">${c.type==='folder'?'📋 Playlist':'▶ Video'}</span>
                ${c.duration?`<span class="p-chip">⏱ ${c.duration}</span>`:''}
                ${data.expires_at?`<span class="p-chip">⏳ Expires ${new Date(data.expires_at).toLocaleDateString()}</span>`:'<span class="p-chip">∞ Lifetime</span>'}
            `;
            document.getElementById('previewBox').style.display = 'block';
            document.getElementById('confirmBtn').style.display = 'block';
        }

        async function redeemKey() {
            if (!currentKeyData) return;
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true; btn.textContent = 'Redeeming...';
            const { error } = await sb.from('user_keys').insert({
                user_id: session.id,
                key_code: currentKeyData.key_code,
                content_data: currentKeyData.content_data,
                expires_at: currentKeyData.expires_at
            });
            if (error) { showMsg('❌ Error redeeming key.','error'); btn.disabled=false; btn.textContent='✅ Confirm & Redeem'; return; }
            await sb.from('access_keys').update({ used_count: currentKeyData.used_count + 1 }).eq('id', currentKeyData.id);
            showMsg('🎉 Key redeemed! Redirecting...','success');
            document.getElementById('previewBox').style.display = 'none';
            btn.style.display = 'none';
            setTimeout(() => window.location.href = 'dashboard.html', 1200);
        }

        document.getElementById('keyInput').addEventListener('keypress', e => { if(e.key==='Enter') checkKey(); });
    </script>
</body>
</html>
