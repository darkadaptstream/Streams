<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkStream Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .header {
            padding: 14px 20px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .back {
            color: #ff4444;
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .logo { font-weight: bold; color: #ff4444; font-size: 1.1rem; }
        .player-wrap { max-width: 900px; margin: 25px auto; padding: 0 16px; }
        .video-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .plyr { border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        .plyr--video { background: #000; }
        :root { --plyr-color-main: #ff4444; }
        .error-box {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        .error-box h3 { color: #ff4444; margin-bottom: 10px; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #ff4444;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← Back</a>
        <div class="logo">▶ DarkStream</div>
    </div>

    <div class="player-wrap">
        <div id="content"><div style="text-align:center;padding:60px;color:#aaa;">Loading video...</div></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        async function loadVideo() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('key');

            if (!key) { window.location.href = 'index.html'; return; }

            try {
                const res = await fetch('keys.json?v=' + Date.now());
                const keys = await res.json();

                if (!keys[key] || keys[key].type !== 'video') {
                    window.location.href = 'index.html'; return;
                }

                const data = keys[key];
                document.title = data.title + ' · DarkStream';

                document.getElementById('content').innerHTML = `
                    <div class="video-title">🎬 ${data.title}</div>
                    <video id="player" controls playsinline>
                        <source src="${data.url}" type="video/mp4">
                    </video>
                `;

                new Plyr('#player', {
                    controls: ['play-large','play','rewind','fast-forward','progress','current-time','duration','mute','volume','settings','fullscreen'],
                    settings: ['speed'],
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                });

            } catch(e) {
                document.getElementById('content').innerHTML = `
                    <div class="error-box">
                        <h3>⚠️ Error Loading Video</h3>
                        <p>Could not load the video. Please try again.</p>
                        <a href="index.html" class="back-btn">← Go Back</a>
                    </div>
                `;
            }
        }

        loadVideo();
    </script>
</body>
</html>
