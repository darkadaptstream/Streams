<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DarkStream Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        .header {
            padding: 14px 20px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .back { color: #ff4444; text-decoration: none; font-size: 1.1rem; }
        .logo { font-weight: bold; color: #ff4444; font-size: 1.1rem; }

        .player-wrap { max-width: 900px; margin: 20px auto; padding: 0 16px; }
        .video-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; }

        /* VIDEO CONTAINER */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* CUSTOM CONTROLS */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            padding: 10px 14px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: opacity 0.3s;
        }
        .controls.hidden { opacity: 0; pointer-events: none; }

        /* PROGRESS BAR */
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #ff4444;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }
        .progress-wrap:hover { height: 6px; }

        /* BOTTOM CONTROLS ROW */
        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 4px;
            line-height: 1;
            opacity: 0.9;
        }
        .ctrl-btn:hover { opacity: 1; }
        .time-display { font-size: 0.78rem; color: #ccc; flex: 1; }

        /* VOLUME */
        input[type=range] {
            -webkit-appearance: none;
            width: 70px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: #ff4444;
            border-radius: 50%;
        }

        /* SPEED */
        .speed-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            font-size: 0.75rem;
            padding: 4px 7px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* FULLSCREEN BUTTON */
        .fs-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px;
        }

        /* PLAY OVERLAY */
        .play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .play-overlay.show { opacity: 1; }

        /* LOADING */
        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
        .loader.show { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FULLSCREEN STYLES */
        .video-container:fullscreen,
        .video-container:-webkit-full-screen {
            border-radius: 0;
            aspect-ratio: unset;
            width: 100vw;
            height: 100vh;
        }
        .video-container:fullscreen video,
        .video-container:-webkit-full-screen video {
            width: 100%;
            height: 100%;
        }

        /* SPEED MENU */
        .speed-menu {
            position: absolute;
            bottom: 55px; right: 40px;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 6px 0;
            display: none;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .speed-menu.show { display: block; }
        .speed-opt {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .speed-opt:hover { background: #252525; }
        .speed-opt.active { color: #ff4444; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← Back</a>
        <div class="logo">▶ DarkStream</div>
    </div>

    <div class="player-wrap">
        <div id="videoTitle" class="video-title"></div>

        <div class="video-container" id="videoContainer">
            <video id="vid" preload="metadata"></video>

            <div class="loader" id="loader"><div class="spinner"></div></div>
            <div class="play-overlay" id="playOverlay">⏸</div>

            <div class="controls" id="controls">
                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="ctrl-row">
                    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶</button>
                    <button class="ctrl-btn" onclick="skip(-10)">⏪</button>
                    <button class="ctrl-btn" onclick="skip(10)">⏩</button>
                    <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
                    <button class="speed-btn" onclick="toggleSpeedMenu()">1x</button>
                    <button class="fs-btn" onclick="toggleFullscreen()">⛶</button>
                </div>
            </div>

            <div class="speed-menu" id="speedMenu">
                <div class="speed-opt" onclick="setSpeed(0.5)">0.5x</div>
                <div class="speed-opt" onclick="setSpeed(0.75)">0.75x</div>
                <div class="speed-opt active" onclick="setSpeed(1)">1x (Normal)</div>
                <div class="speed-opt" onclick="setSpeed(1.25)">1.25x</div>
                <div class="speed-opt" onclick="setSpeed(1.5)">1.5x</div>
                <div class="speed-opt" onclick="setSpeed(2)">2x</div>
            </div>
        </div>
    </div>

    <script>
        const vid = document.getElementById('vid');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const controls = document.getElementById('controls');
        const loader = document.getElementById('loader');
        const playOverlay = document.getElementById('playOverlay');
        const container = document.getElementById('videoContainer');
        let controlTimer;
        let currentSpeed = 1;

        // Load video from key
        async function loadVideo() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('key');
            if (!key) { window.location.href = 'index.html'; return; }

            try {
                const res = await fetch('keys.json?v=' + Date.now());
                const keys = await res.json();
                if (!keys[key] || keys[key].type !== 'video') { window.location.href = 'index.html'; return; }

                const data = keys[key];
                document.title = data.title + ' · DarkStream';
                document.getElementById('videoTitle').textContent = '🎬 ' + data.title;
                vid.src = data.url;
            } catch(e) {
                alert('Error loading video.');
            }
        }

        // Play/Pause
        function togglePlay() {
            if (vid.paused) {
                vid.play();
                playBtn.textContent = '⏸';
                flashOverlay('▶');
            } else {
                vid.pause();
                playBtn.textContent = '▶';
                flashOverlay('⏸');
            }
        }

        function flashOverlay(icon) {
            playOverlay.textContent = icon;
            playOverlay.classList.add('show');
            setTimeout(() => playOverlay.classList.remove('show'), 600);
        }

        // Skip
        function skip(sec) { vid.currentTime = Math.max(0, vid.currentTime + sec); }

        // Volume
        function setVolume(v) { vid.volume = v; }

        // Speed
        function toggleSpeedMenu() {
            document.getElementById('speedMenu').classList.toggle('show');
        }
        function setSpeed(s) {
            vid.playbackRate = s;
            currentSpeed = s;
            document.querySelector('.speed-btn').textContent = s + 'x';
            document.querySelectorAll('.speed-opt').forEach(el => {
                el.classList.toggle('active', parseFloat(el.textContent) === s);
            });
            document.getElementById('speedMenu').classList.remove('show');
        }

        // Fullscreen + landscape lock
        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const el = container;
                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                }
                // Lock to landscape on mobile
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        // Progress bar
        vid.addEventListener('timeupdate', () => {
            if (vid.duration) {
                const pct = (vid.currentTime / vid.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
            }
        });

        document.getElementById('progressWrap').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            vid.currentTime = pct * vid.duration;
        });

        function fmt(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60).toString().padStart(2, '0');
            return m + ':' + sec;
        }

        // Auto hide controls
        container.addEventListener('click', () => { showControls(); togglePlay(); });
        container.addEventListener('touchstart', () => showControls());

        function showControls() {
            controls.classList.remove('hidden');
            clearTimeout(controlTimer);
            controlTimer = setTimeout(() => { if (!vid.paused) controls.classList.add('hidden'); }, 3000);
        }

        // Loader
        vid.addEventListener('waiting', () => loader.classList.add('show'));
        vid.addEventListener('canplay', () => loader.classList.remove('show'));
        vid.addEventListener('playing', () => { loader.classList.remove('show'); playBtn.textContent = '⏸'; });
        vid.addEventListener('pause', () => { playBtn.textContent = '▶'; controls.classList.remove('hidden'); });

        // Close speed menu on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.speed-btn') && !e.target.closest('.speed-menu')) {
                document.getElementById('speedMenu').classList.remove('show');
            }
        });

        loadVideo();
    </script>
</body>
</html>
